name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run --workspace lessmark
      - run: cargo package --manifest-path crates/lessmark/Cargo.toml
      - run: python -m pip install build
      - run: python -m build --sdist --wheel packages/python
      - run: npm ci
        working-directory: site
      - run: npm audit --audit-level=high
        working-directory: site
      - run: npm run build
        working-directory: site
      - run: npx --yes @vscode/vsce package
        working-directory: editors/vscode
